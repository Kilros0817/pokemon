<!-- src/app/app.component.html -->
@if (!isAuthRoute()) {
  <div class="app">
    <!-- Header Component -->
    <app-header 
      [isDarkMode]="isDarkMode()"
      [trainer]="trainer()"
      (themeToggle)="toggleTheme()"
      (profileClick)="goToProfile()"
    />
    
    <!-- Main Content -->
    <main class="main">
      <div class="container">
        <router-outlet />
      </div>
    </main>
    
    <!-- Footer Component -->
    <app-footer />
  </div>
} @else {
  <!-- Auth Pages (No Header/Footer) -->
  <router-outlet />
}
